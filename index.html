<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Compiler Visualizer</title>

    <link rel="stylesheet" href="style.css?v=2">

    <script src="lexer.js?v=2"></script>
    <script src="parser.js?v=2"></script>
    <script src="symbolTable.js?v=2"></script>
    <script src="tac.js?v=2"></script>
    <script src="tree.js?v=2"></script>
    <script src="drawTree.js?v=2"></script>
    <script src="highlights.js?v=2"></script>
    <script src="compiler.js?v=2"></script>
    <script src="background.js?v=1" defer></script>
    <script src="script.js?v=2" defer></script>
    <script src="cfg.js?v=2"></script>
</head>

<body>

    <h1>⚡ Compiler Visualizer</h1>

    <textarea id="code" placeholder="Write your code here..."></textarea>

    <div class="btn-container">
        <button onclick="setActive(this); runCompiler('tokens')">1. Lexer</button>
        <button onclick="setActive(this); runCompiler('symbols')">2. Symbol Table</button>
        <button onclick="setActive(this); runCompiler('errors')">3. Errors</button>
        <button onclick="setActive(this); runCompiler('tree')">4. Tree</button>
        <button onclick="setActive(this); runCompiler('cfg')">5. CFG</button>
        <button onclick="setActive(this); runCompiler('tac')">6. 3AC</button>
        <button onclick="clearAll()">Clear</button>
        <button onclick="resetCode()">Reset</button>
    </div>

    <table id="tokens">
        <tbody></tbody>
    </table>
    <div id="symbols"></div>
    <div id="errors"></div>
    <div id="tac"></div>

    <canvas id="tree" width="1400" height="5000"></canvas>
    <canvas id="cfg" width="1450" height="5000"></canvas>

</body>

</html>
